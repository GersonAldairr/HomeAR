<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeAR - Recomendaciones</title>
    <link rel="stylesheet" href="css/app-style.css">
</head>
<body>

    <div class="phone-container">
        <main class="screen active">
            
            <header class="transparent-header">
                <button class="btn-back dark" onclick="history.back()">&#8592;</button>
                <span class="dark-title">Recomendaciones</span>
            </header>

            <div class="faults-container">
                
                <div class="fault-item">
                    <img src="img/Icono.png" alt="Alerta" class="fault-thumb icon-alert">
                    <div class="fault-info">
                        <h3>Acero expuesto</h3>
                        <p>Limpiar el área y aplicar inhibidor de corrosión. Cubrir con mortero.</p>
                    </div>
                </div>

                <div class="fault-item">
                    <img src="img/Icono.png" alt="Alerta" class="fault-thumb icon-alert">
                    <div class="fault-info">
                        <h3>Deficiencia en juntas de mortero</h3>
                        <p>Retirar mortero suelto y rellenar las juntas con mezcla adecuada.</p>
                    </div>
                </div>

            </div>

            <img src="img/Group 2 (1).png" class="btn-continue" onclick="location.href='detalles-fallas.html'">
            
        </main>
    </div>

</body>
</html>

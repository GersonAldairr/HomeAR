<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeAR - Informe Técnico</title>
    <link rel="stylesheet" href="css/app-style.css">
</head>
<body>

    <div class="phone-container">
        <main class="screen active technical-report-screen">
            
            <header class="transparent-header bg-white">
                <button class="btn-back dark" onclick="location.href='historial.html'">&#8592;</button>
                <span class="dark-title">Informe técnico</span>
            </header>

            <div class="report-content">
                <div class="report-image-wrapper">
                    <img src="img/CamPreview.png" alt="Captura de Inspección" class="report-photo">
                </div>

                <ul class="report-metadata">
                    <li>
                        <span class="meta-label">Fecha</span>
                        <span class="meta-value">24 May 2024 - 10:30 a.m.</span>
                    </li>
                    <li>
                        <span class="meta-label">Ubicación</span>
                        <span class="meta-value">Casa - Sala Principal</span>
                    </li>
                    <li>
                        <span class="meta-label">Nivel de riesgo</span>
                        <span class="meta-value risk-yellow">Riesgo Medio</span>
                    </li>
                    <li>
                        <span class="meta-label">Fallas encontradas</span>
                        <span class="meta-value">3 detectadas</span>
                    </li>
                </ul>
            </div>

            <div class="action-buttons-container">
                <img src="img/VerCompartirPDF.png" alt="Ver / compartir PDF" class="btn-action" onclick="location.href='home.html'">
            </div>
            
        </main>
    </div>

</body>
</html>

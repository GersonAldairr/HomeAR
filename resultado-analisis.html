<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeAR - Resultado del análisis</title>
    <link rel="stylesheet" href="css/app-style.css">
</head>
<body>

    <div class="phone-container">
        <main class="screen active result-screen">
            
            <header class="transparent-header">
                <button class="btn-back dark" onclick="location.href='home.html'">&#8592;</button>
                <span class="dark-title">Resultado del análisis</span>
            </header>

            <div class="summary-container">
                <div class="summary-card">
                    <img src="img/⚠.png" alt="Alerta" class="alert-icon-big">
                    <h2>Se detectaron<br>2 fallas</h2>
                    <img src="img/Background.png" alt="Riesgo Medio" class="risk-badge-img">
                </div>
            </div>

            <div class="action-buttons-container">
                <img src="img/Group 2.png" alt="Ver detalles" class="btn-action" onclick="location.href='detalles-fallas.html'">
                <img src="img/Group 3.png" alt="Recomendaciones" class="btn-action" onclick="location.href='recomendaciones.html'">
            </div>
            
        </main>
    </div>

</body>
</html>

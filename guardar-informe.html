<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeAR - Guardar Informe</title>
    <link rel="stylesheet" href="css/app-style.css">
</head>
<body>

    <div class="phone-container">
        <main class="screen active success-screen">
            
            <header class="transparent-header">
                <button class="btn-back dark" onclick="location.href='recomendaciones.html'">&#8592;</button>
                <span class="dark-title">Guardar informe</span>
            </header>

            <div class="success-container">
                <div class="success-content">
                    <img src="img/Margin.png" alt="Éxito" class="success-icon">
                    <h2 class="success-title">Informe guardado<br>correctamente</h2>
                    <p class="success-text">Se ha consolidado el reporte técnico en su<br>historial de inspecciones.</p>
                </div>
            </div>

            <div class="action-buttons-container">
                <img src="img/VerInforme.png" alt="Ver informe" class="btn-action" onclick="location.href='detallles-fallas.html'">
                <img src="img/Finalizar.png" alt="Finalizar" class="btn-action" onclick="location.href='home.html'">
            </div>
            
        </main>
    </div>

</body>
</html>

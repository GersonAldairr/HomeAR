<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeAR - Permisos</title>

    <link rel="stylesheet" href="css/onboarding.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="screen permissions-screen">

        <!-- Flecha atrás -->
        <a href="onboarding3.html" class="back-btn">
            &#8592;
        </a>

        <!-- Título -->
        <h1 class="permissions-title">
            Permisos
        </h1>

        <p class="permissions-subtitle">
            Para brindarte una mejor experiencia
            necesitamos acceder a:
        </p>

        <!-- Lista de permisos -->

        <div class="permissions-list">

            <!-- Cámara -->
            <div class="permission-item">

                <img
                    src="img/camera.png"
                    alt="Cámara"
                    class="permission-icon"
                >

                <div class="permission-text">
                    <h3>Camara</h3>
                    <p>Para escanear con realidad aumentada</p>
                </div>

                <img
                    src="img/arrow-right.png"
                    alt=""
                    class="arrow-icon"
                >

            </div>

            <!-- Almacenamiento -->
            <div class="permission-item">

                <img
                    src="img/storage.png"
                    alt="Almacenamiento"
                    class="permission-icon"
                >

                <div class="permission-text">
                    <h3>Almacenamiento</h3>
                    <p>Para guardar tus inspecciones</p>
                </div>

                <img
                    src="img/arrow-right.png"
                    alt=""
                    class="arrow-icon"
                >

            </div>

            <!-- Ubicación -->
            <div class="permission-item">

                <img
                    src="img/location.png"
                    alt="Ubicación"
                    class="permission-icon"
                >

                <div class="permission-text">
                    <h3>Ubicacion</h3>
                    <p>Para información referencial</p>
                </div>

                <img
                    src="img/arrow-right.png"
                    alt=""
                    class="arrow-icon"
                >

            </div>

        </div>

        <!-- Botones -->

        <a class="primary-btn" href="home.html">
            Continuar
        </a>

        <button class="secondary-btn">
            Ahora no
        </button>

    </div>

</body>
</html>

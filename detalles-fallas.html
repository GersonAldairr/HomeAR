<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeAR - Detalles de Fallas</title>
    <link rel="stylesheet" href="css/app-style.css">
</head>
<body>

    <div class="phone-container">
        <main class="screen active">
            <header>
                <button class="btn-back" onclick="location.href='resultado-analisis.html'">&#8592;</button>
                <span>Detalles de fallas</span>
            </header>

            <div class="faults-container">
                <!-- Falla1 -->
                <div class="fault-item">
                    <img src="img/AceroExpuesto.png" class="fault-thumb">
                    <div class="fault-info">
                        <h3>Acero expuesto</h3>
                        <p>Varilla expuesta con corrosión</p>
                        <span class="badge red">Alto</span>
                    </div>
                </div>
                <!-- Falla2 -->
                <div class="fault-item">
                    <img src="img/CamPreview.png" class="fault-thumb">
                    <div class="fault-info">
                        <h3>Deficiencia en juntas</h3>
                        <p>Juntas vacías en bloques</p>
                        <span class="badge red">Alto</span>
                    </div>
                </div>
            </div>

            <img src="img/Group 2 (1).png" class="btn-continue" onclick="location.href='guardar-informe.html'">
        </main>
    </div>

</body>
</html>
